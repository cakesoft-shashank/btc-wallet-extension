name: Firefox AMO Upload

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (for example 0.1.1)
        required: true
        type: string
      channel:
        description: AMO submission channel
        required: true
        type: choice
        default: listed
        options:
          - listed
          - unlisted

jobs:
  upload-firefox:
    name: Build And Upload Firefox Add-on
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate requested version
        run: |
          VERSION="${{ inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Invalid version: $VERSION"
            echo "Use 1-4 numeric segments (for example 0.2.0 or 1.2.3.4)."
            exit 1
          fi

      - name: Apply version to package and manifest
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          node -e '
            const fs = require("fs");
            const version = process.env.RELEASE_VERSION;

            const packagePath = "package.json";
            const manifestPath = "public/manifest.json";

            const pkg = JSON.parse(fs.readFileSync(packagePath, "utf8"));
            pkg.version = version;
            fs.writeFileSync(packagePath, JSON.stringify(pkg, null, 2) + "\n");

            const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
            manifest.version = version;
            fs.writeFileSync(manifestPath, JSON.stringify(manifest, null, 2) + "\n");
          '

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Firefox package
        run: npm run package:firefox

      - name: Prepare Firefox source directory
        run: |
          FIREFOX_ZIP=$(ls -1 release/bitcoin-wallet-firefox-v*.zip | head -n 1)
          if [ -z "$FIREFOX_ZIP" ]; then
            echo "Firefox package zip not found in release/."
            exit 1
          fi
          mkdir -p firefox-dist
          unzip -q "$FIREFOX_ZIP" -d firefox-dist

      - name: Submit to AMO
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [ -z "$AMO_JWT_ISSUER" ] || [ -z "$AMO_JWT_SECRET" ]; then
            echo "Missing AMO credentials. Set AMO_JWT_ISSUER and AMO_JWT_SECRET secrets."
            exit 1
          fi

          npx web-ext sign \
            --source-dir firefox-dist \
            --artifacts-dir web-ext-artifacts \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET" \
            --channel "${{ inputs.channel || 'listed' }}" \
            --timeout 900000

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firefox-signed-artifacts
          path: |
            web-ext-artifacts/**
            release/bitcoin-wallet-firefox-v*.zip
          if-no-files-found: error

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- package.json public/manifest.json; then
            echo "No version changes to commit."
            exit 0
          fi

          git add package.json public/manifest.json
          git commit -m "chore(release): bump version to ${{ inputs.version }}"
          git push origin HEAD:${{ github.ref_name }}

      - name: Create and push release tag
        run: |
          TAG="v${{ inputs.version }}"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on remote."
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          files: |
            release/bitcoin-wallet-firefox-v*.zip
            web-ext-artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
